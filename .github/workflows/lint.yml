name: Lint & Format

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: ESLint
        run: pnpm lint
      - name: Prettier check
        run: pnpm format:check
      - name: TypeScript check
        run: pnpm typecheck
